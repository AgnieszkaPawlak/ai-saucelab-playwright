name: SauceDemo Tests

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'

env:
  BASE_URL: https://www.saucedemo.com

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    env:
      SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
      SAUCE_PASSWORD_VAR: ${{ vars.SAUCE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Prepare .env for Playwright
        run: |
          PASSWORD="${SAUCE_PASSWORD:-${STANDARD_PASSWORD:-${SAUCE_PASSWORD_VAR}}}"
          if [ -z "$PASSWORD" ]; then
            echo "::warning::No password in Secrets (SAUCE_PASSWORD) or Variables. Using public demo password."
            PASSWORD="secret_sauce"
          fi
          printf 'BASE_URL=https://www.saucedemo.com\nSAUCE_PASSWORD=%s\n' "$PASSWORD" > .env
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-smoke
          path: playwright-report/

  regression:
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'schedule'
    env:
      SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
      SAUCE_PASSWORD_VAR: ${{ vars.SAUCE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Prepare .env for Playwright
        run: |
          PASSWORD="${SAUCE_PASSWORD:-${STANDARD_PASSWORD:-${SAUCE_PASSWORD_VAR}}}"
          if [ -z "$PASSWORD" ]; then
            echo "::warning::No password in Secrets (SAUCE_PASSWORD) or Variables. Using public demo password."
            PASSWORD="secret_sauce"
          fi
          printf 'BASE_URL=https://www.saucedemo.com\nSAUCE_PASSWORD=%s\n' "$PASSWORD" > .env
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:regression
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-regression
          path: playwright-report/

  characterization:
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'schedule'
    env:
      SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
      SAUCE_PASSWORD_VAR: ${{ vars.SAUCE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Prepare .env for Playwright
        run: |
          PASSWORD="${SAUCE_PASSWORD:-${STANDARD_PASSWORD:-${SAUCE_PASSWORD_VAR}}}"
          if [ -z "$PASSWORD" ]; then
            echo "::warning::No password in Secrets (SAUCE_PASSWORD) or Variables. Using public demo password."
            PASSWORD="secret_sauce"
          fi
          printf 'BASE_URL=https://www.saucedemo.com\nSAUCE_PASSWORD=%s\n' "$PASSWORD" > .env
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:characterization
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-characterization
          path: playwright-report/

  nf:
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'schedule'
    env:
      SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
      STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
      SAUCE_PASSWORD_VAR: ${{ vars.SAUCE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Prepare .env for Playwright
        run: |
          PASSWORD="${SAUCE_PASSWORD:-${STANDARD_PASSWORD:-${SAUCE_PASSWORD_VAR}}}"
          if [ -z "$PASSWORD" ]; then
            echo "::warning::No password in Secrets (SAUCE_PASSWORD) or Variables. Using public demo password."
            PASSWORD="secret_sauce"
          fi
          printf 'BASE_URL=https://www.saucedemo.com\nSAUCE_PASSWORD=%s\n' "$PASSWORD" > .env
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:nf
      - run: npm run test:cross-browser
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-nf
          path: playwright-report/
